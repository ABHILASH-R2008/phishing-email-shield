<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Shield</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }
        h1 { margin-bottom: 0.5rem; color: #38bdf8; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .input-group { display: flex; gap: 10px; }
        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #334155;
            color: white;
            font-size: 1rem;
        }
        button {
            padding: 12px 24px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #0369a1; }
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .danger { background-color: #7f1d1d; color: #fca5a5; border: 1px solid #b91c1c; }
        .safe { background-color: #064e3b; color: #6ee7b7; border: 1px solid #047857; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛡️ AI Phishing Shield</h1>
        <p>Paste a suspicious link below to let our machine learning model analyze it.</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Enter URL to analyze (e.g., http://scam-site.com)">
            <button onclick="scanURL()">Scan Link</button>
        </div>

        <div id="result" class="result-box"></div>
    </div>

    <script>
        async function scanURL() {
            const urlInput = document.getElementById('urlInput').value;
            const resultBox = document.getElementById('result');
            
            if (!urlInput) {
                alert("Please paste a URL first!");
                return;
            }

            resultBox.style.display = "block";
            resultBox.className = "result-box";
            resultBox.style.backgroundColor = "#334155";
            resultBox.style.color = "white";
            resultBox.innerText = "Analyzing links patterns...";

            try {
                // Fetch request sends the URL data directly to our Flask backend
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await response.json();
                
                // Read the backend response and update the screen colors dynamically
                if (data.verdict === "Phishing") {
                    resultBox.className = "result-box danger";
                    resultBox.innerText = "🚨 WARNING: This looks like a Phishing Scam!";
                } else {
                    resultBox.className = "result-box safe";
                    resultBox.innerText = "✅ SAFE: This link appears clean to our AI.";
                }
            } catch (error) {
                resultBox.innerText = "Error connecting to AI Server.";
            }
        }
    </script>
</body>
</html>
